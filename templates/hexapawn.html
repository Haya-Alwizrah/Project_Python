{% extends 'base.html' %}

{% block title %}HexaPawn Game{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hexapawn.css') }}">
{% endblock %}

{% block content %}
    <h1>HexaPawn Game</h1>
    <div class="status" id="status-text">Loading game...</div>
    <div class="board" id="game-board"></div>
    <button class="btn-restart" onclick="resetGame()">Restart Game</button>
    <a href="/multiplayer" class="btn-back">← Back to Two Player Games</a>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='js/hexapawn.js') }}"></script>
{% endblock %}
